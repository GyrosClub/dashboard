<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyros Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#E8C97A;--bg:#0D0D0D;--bg2:#141414;--bg3:#1C1C1C;--brd:rgba(201,168,76,.18);--txt:#F0EAD6;--dim:#8a8070;--grn:#4CAF7A;--red:#E05252;--ylw:#E0B952}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:Jost,sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(201,168,76,.06),transparent 70%);pointer-events:none;z-index:0}
.topbar{height:4px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 8px,transparent 8px,transparent 20px);opacity:.6}

/* AUTH */
.aw{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.ab{background:var(--bg2);border:1px solid var(--brd);padding:40px 36px;width:92%;max-width:360px;text-align:center}
.ai{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--txt);padding:12px;font-family:Jost,sans-serif;font-size:15px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:.05em}
.ai:focus{border-color:var(--gold)}
.abtn{width:100%;background:var(--gold);color:#0D0D0D;border:none;padding:13px;font-family:Jost,sans-serif;font-size:12px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-top:4px}
.abtn:hover{background:var(--gold-l)}
.aerr{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.adev{font-size:10px;color:var(--dim);margin-top:18px;letter-spacing:.08em}

/* LAYOUT */
header{position:relative;z-index:1;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:10px}
.logo-w{display:flex;align-items:center;gap:12px}
.logo-img{height:48px;object-fit:contain}
.logo-dev{font-size:10px;color:var(--dim);letter-spacing:.1em;margin-top:3px}
.hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:none;cursor:pointer;font-family:Jost,sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:10px 18px;display:flex;align-items:center;gap:6px;transition:all .2s}
.bg{background:var(--gold);color:#0D0D0D}.bg:hover{background:var(--gold-l)}.bg:disabled{opacity:.5;cursor:wait}
.bo{background:transparent;color:var(--gold);border:1px solid var(--brd)}.bo:hover{border-color:var(--gold);background:rgba(201,168,76,.06)}
.sp{width:12px;height:12px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.sp.on{display:inline-block}
main{position:relative;z-index:1;padding:18px 22px;max-width:1300px;margin:0 auto}

/* PLAN MODAL */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mb.show{display:flex}
.md{background:var(--bg2);border:1px solid var(--brd);padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mt{font-family:Cinzel,serif;font-size:14px;color:var(--gold);margin-bottom:4px}
.ms{font-size:12px;color:var(--dim);margin-bottom:16px}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.pl{font-size:12px;color:var(--txt);flex:1}
.pi{background:var(--bg3);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;font-family:Jost,sans-serif;font-size:13px;outline:none;text-align:right;width:120px}
.pi:focus{border-color:var(--gold)}
.pd{font-size:10px;color:var(--dim);width:75px;text-align:right}

/* STATUS */
.sb{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--brd);font-size:13px;color:var(--dim)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0}
.dot.live{background:var(--grn);animation:pulse 2s infinite}.dot.e{background:var(--red)}.dot.ld{background:var(--ylw);animation:pulse .5s infinite}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 20px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:Jost,sans-serif;font-weight:700;white-space:nowrap}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* TOP 4 CARDS */
.top4{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.tc{background:var(--bg2);border:1px solid var(--brd);padding:18px 20px;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tc.g::before{background:var(--grn)}.tc.r::before{background:var(--red)}.tc.y::before{background:var(--ylw)}.tc.n::before{background:var(--gold);opacity:.4}
.tc-ico{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.tc-ico.g{background:rgba(76,175,122,.15)}.tc-ico.r{background:rgba(224,82,82,.15)}.tc-ico.y{background:rgba(224,185,82,.15)}.tc-ico.n{background:rgba(201,168,76,.1)}
.tc-lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.tc-val{font-size:24px;color:var(--txt);font-weight:700;line-height:1.1;margin-bottom:5px}
.tc-val.g{color:var(--grn)}.tc-val.r{color:var(--red)}.tc-val.y{color:var(--ylw)}
.tc-sub{font-size:12px;color:var(--dim)}
.tc-pct{font-size:12px;font-weight:700;margin-top:7px}
.tc-pct.g{color:var(--grn)}.tc-pct.r{color:var(--red)}.tc-pct.y{color:var(--ylw)}
.tc-bar{height:4px;background:rgba(255,255,255,.07);margin-top:5px;overflow:hidden}
.tc-bar-f{height:100%;min-width:2px;transition:width 1s}
.tc-bar-f.g{background:var(--grn)}.tc-bar-f.r{background:var(--red)}.tc-bar-f.y{background:var(--ylw)}.tc-bar-f.n{background:var(--gold)}

/* STRIP */
.strip{background:var(--bg2);border:1px solid var(--brd);padding:13px 18px;margin-bottom:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:center}
.tl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.tv{font-size:17px;color:var(--gold);font-weight:700}.tv.s{font-size:13px;color:var(--dim);font-weight:400}
.pbw{display:flex;flex-direction:column;gap:3px}.pbr{display:flex;justify-content:space-between}
.pc{font-size:14px;font-weight:700}.pc.g{color:var(--grn)}.pc.y{color:var(--ylw)}.pc.r{color:var(--red)}
.pbg{height:5px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.pbf{height:100%;min-width:2px;transition:width 1s}
.pbf.g{background:linear-gradient(90deg,#2d7a52,var(--grn))}.pbf.y{background:linear-gradient(90deg,#9a7a20,var(--ylw))}.pbf.r{background:linear-gradient(90deg,#8a2020,var(--red))}
.pbn{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.35)}

/* OUTLET CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.oc{background:var(--bg2);border:1px solid var(--brd);padding:15px;transition:border-color .2s,transform .2s}
.oc:hover{border-color:rgba(201,168,76,.4);transform:translateY(-1px)}
.oc.ov{border-left:3px solid var(--grn)}.oc.tr{border-left:3px solid var(--ylw)}.oc.bh{border-left:3px solid var(--red)}
.on2{font-size:12px;color:var(--txt);font-weight:700;margin-bottom:10px}
.r3{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.blk{display:flex;flex-direction:column;gap:2px}
.bl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.fv{font-size:16px;color:var(--txt);font-weight:700}.pv{font-size:13px;color:var(--dim)}.dv{font-size:12px;color:var(--dim)}
.pb2{margin-bottom:7px}.p2r{display:flex;justify-content:space-between;margin-bottom:3px}
.p2{font-size:12px;font-weight:700}.p2.g{color:var(--grn)}.p2.y{color:var(--ylw)}.p2.r{color:var(--red)}
.pbd{font-size:11px;color:var(--dim)}
.bdg{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:3px 7px}
.bdg.g{background:rgba(76,175,122,.12);color:var(--grn)}.bdg.r{background:rgba(224,82,82,.12);color:var(--red)}.bdg.y{background:rgba(224,185,82,.12);color:var(--ylw)}
.sh{font-size:9px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:2px}

/* ARCHIVE */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.ac{background:var(--bg2);border:1px solid var(--brd);padding:14px;cursor:pointer;transition:border-color .2s,transform .2s}
.ac:hover{border-color:var(--gold);transform:translateY(-1px)}
.am{font-family:Cinzel,serif;font-size:11px;color:var(--gold);margin-bottom:6px}
.at2{font-size:16px;color:var(--txt);font-weight:700}
.ap{font-size:11px;margin-top:3px}.ap.g{color:var(--grn)}.ap.y{color:var(--ylw)}.ap.r{color:var(--red)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:800px){.strip{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.ag{grid-template-columns:1fr 1fr}header,main{padding:12px 14px}}
@media(max-width:480px){.top4{grid-template-columns:1fr}.strip{grid-template-columns:1fr}.ag{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="aw" id="aw">
  <div class="ab">
    <img id="auth-logo" src="logo.png" style="height:52px;margin-bottom:20px;object-fit:contain" onerror="this.style.display='none'">
    <div style="font-family:Cinzel,serif;font-size:13px;letter-spacing:.2em;color:var(--gold);margin-bottom:4px">ПЛАН ПРОДАЖ</div>
    <div style="font-size:10px;color:var(--dim);letter-spacing:.1em;margin-bottom:26px">Введите данные для доступа</div>
    <input class="ai" id="al" type="text" placeholder="Логин" autocomplete="off" autocapitalize="none">
    <input class="ai" id="ap" type="password" placeholder="Пароль">
    <button class="abtn" id="abtn">Войти</button>
    <div class="aerr" id="aerr"></div>
    <div class="adev">Разработал Хаджи С.С.</div>
  </div>
</div>

<!-- PLAN MODAL -->
<div class="mb" id="pm">
  <div class="md">
    <div class="mt" id="pmt">Планы</div>
    <div class="ms" id="pms">Введите план (₽)</div>
    <div id="pil"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn bg" id="psb" style="flex:1;justify-content:center">Сохранить</button>
      <button class="btn bo" id="pcb">Закрыть</button>
    </div>
  </div>
</div>

<div class="topbar"></div>
<header>
  <div class="logo-w">
    <img class="logo-img" src="logo.png" alt="Gyros Club" onerror="this.style.display='none'">
    <div class="logo-dev">Разработал Хаджи С.С.</div>
  </div>
  <div class="hbtns">
    <span id="ut" style="font-size:11px;color:var(--dim)"></span>
    <button class="btn bo" id="pb">⚙ Планы</button>
    <button class="btn bg" id="rb"><div class="sp" id="sp"></div>↻ Обновить</button>
  </div>
</header>

<main>
  <div class="sb"><span class="dot" id="sd"></span><span id="st">Загрузка...</span></div>
  <div class="tabs">
    <button class="tab on" id="tt">Сегодня</button>
    <button class="tab" id="tm">Месяц</button>
    <button class="tab" id="ta">Архив</button>
  </div>
  <div id="vt"><div class="top4" id="ct"></div><div class="strip" id="st2"></div><div class="sh">По точкам — сегодня</div><div class="grid" id="gt"></div></div>
  <div id="vm" style="display:none"><div class="top4" id="cm"></div><div class="strip" id="sm"></div><div class="sh">По точкам — за месяц</div><div class="grid" id="gm"></div></div>
  <div id="va" style="display:none">
    <div class="sh">Архив (с апреля 2026)</div>
    <div class="ag" id="ag"></div>
    <div id="ad" style="display:none;margin-top:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <button class="btn bo" id="abk" style="font-size:9px">← Назад</button>
        <span id="at3" style="font-family:Cinzel,serif;font-size:13px;color:var(--gold)"></span>
      </div>
      <div class="top4" id="acd"></div>
      <div class="sh" style="margin-top:14px">По точкам</div>
      <div class="grid" id="agd"></div>
    </div>
  </div>
</main>

<script>
const PX='https://gyros-proxy.gyrosclub161.workers.dev';
const LOGIN='GC26',PASS='gc2026/4';
const ST=[{id:43606,n:'01. Gyros Club Ворошиловский 55',s:'Ворошиловский 55'},{id:48767,n:'02. Gyros Club Ленина 81/8',s:'Ленина 81/8'},{id:55956,n:'03. Gyros Club Стачки 207',s:'Стачки 207'},{id:57060,n:'04. Gyros Club Стачки 220',s:'Стачки 220'},{id:78987,n:'06. Gyros Club Аксай',s:'Аксай'},{id:95683,n:'07. Gyros Club Мануфактура',s:'Мануфактура'},{id:101199,n:'08. Gyros Club Зорге 19/162',s:'Зорге 19/162'}];
const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DP={43606:1020000,48767:1560000,55956:1020000,57060:1320000,78987:1100000,95683:1800000,101199:1440000};
let TR={},MR={};

function chkAuth(){return sessionStorage.getItem('gc_a')==='1';}
function initAuth(){
  if(chkAuth()){document.getElementById('aw').style.display='none';load();return;}
  document.getElementById('abtn').addEventListener('click',doAuth);
  document.getElementById('ap').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
}
function doAuth(){
  const l=document.getElementById('al').value.trim();
  const p=document.getElementById('ap').value;
  if(l===LOGIN&&p===PASS){sessionStorage.setItem('gc_a','1');document.getElementById('aw').style.display='none';load();}
  else{document.getElementById('aerr').textContent='Неверный логин или пароль';document.getElementById('ap').value='';}
}

function gpk(y,m){return'gcp_'+y+'_'+m;}
function gpl(y,m){try{const s=JSON.parse(localStorage.getItem(gpk(y,m))||'{}');if(Object.keys(s).length)return s;}catch(e){}return{...DP};}
function sdm(y,m){return new Date(y,m+1,0).getDate();}
function fm(n){return Math.round(n).toLocaleString('ru-RU');}
function ft(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function col(p){return p>=100?'g':p>=80?'y':'r';}
function ss(c,x){document.getElementById('sd').className='dot '+(c==='g'?'live':c==='r'?'e':'ld');document.getElementById('st').textContent=x;}

async function fr(df,dt){
  const r={};
  for(const s of ST){
    try{
      const x=await fetch(PX+'/api/kpi/dashboard/get-data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dateFrom:df,dateTo:dt,metricCodes:['REV_GROSS'],storeIds:[s.id],dataType:'DATA_TOTAL'})});
      const d=await x.json();r[s.id]=d?.data?.REV_GROSS||0;
    }catch(e){r[s.id]=0;}
  }
  return r;
}

async function load(){
  const b=document.getElementById('rb'),sp=document.getElementById('sp');
  b.disabled=true;sp.classList.add('on');ss('y','Загружаю данные из iiko...');
  try{
    const n=new Date(),td=fd(n),ms=fd(new Date(n.getFullYear(),n.getMonth(),1));
    [TR,MR]=await Promise.all([fr(td,td),fr(ms,td)]);
    rT(n);rM(n);
    ss('g','Данные актуальны');
    document.getElementById('ut').textContent=n.toLocaleDateString('ru-RU')+' '+ft(n);
    chkPlan(n);
  }catch(e){ss('r','Ошибка: '+e.message);}
  b.disabled=false;sp.classList.remove('on');
}

function chkPlan(n){
  const y=n.getFullYear(),m=n.getMonth(),d=n.getDate();
  if(d>=1&&d<=10&&!localStorage.getItem(gpk(y,m)))setTimeout(()=>openPM(true),800);
}

function mkTop4(el,cards){
  document.getElementById(el).innerHTML=cards.map(c=>
    '<div class="tc '+c.c+'">'+
    '<div class="tc-ico '+c.c+'">'+c.ico+'</div>'+
    '<div class="tc-lbl">'+c.lbl+'</div>'+
    '<div class="tc-val '+(c.vc||'')+'">'+c.val+'</div>'+
    '<div class="tc-sub">'+c.sub+'</div>'+
    (c.pct!==undefined?'<div class="tc-pct '+c.c+'">'+c.pct+'%</div><div class="tc-bar"><div class="tc-bar-f '+c.c+'" style="width:'+Math.min(c.pct,100)+'%"></div></div>':'')
    +'</div>').join('');
}

function mkStrip(el,tf,td,te,pct,c,dpct,dlbl){
  document.getElementById(el).innerHTML=
    '<div><div class="tl">Факт</div><div class="tv">'+fm(tf)+' ₽</div></div>'+
    '<div><div class="tl">'+dlbl+'</div><div class="tv s">'+fm(td)+' ₽</div></div>'+
    '<div><div class="tl">Ожидалось</div><div class="tv s">'+fm(te)+' ₽</div></div>'+
    '<div class="pbw"><div class="pbr"><span class="pc '+c+'">'+pct+'%</span><span style="font-size:10px;color:var(--dim)">'+dpct+'</span></div>'+
    '<div class="pbg"><div class="pbf '+c+'" style="width:'+Math.min(pct,100)+'%"></div></div></div>';
}

function mkGrid(el,data,PL,DM,isDay,n){
  const el2=isDay?(n.getHours()*60+n.getMinutes())/(24*60):1;
  const day=isDay?0:n.getDate();
  document.getElementById(el).innerHTML=[...ST].sort((a,b)=>{
    const fa=data[a.id]||0,fb=data[b.id]||0;
    const ea=(PL[a.id]||0)/DM*(isDay?el2:day),eb=(PL[b.id]||0)/DM*(isDay?el2:day);
    return(eb>0?fb/eb:0)-(ea>0?fa/ea:0);
  }).map(s=>{
    const f=data[s.id]||0,pl=PL[s.id]||0,dv=pl/DM;
    const e=Math.round(dv*(isDay?el2:day)),pt=e>0?Math.round(f/e*100):0;
    const c2=col(pt),cl=pt>=100?'ov':pt>=80?'tr':'bh',df=Math.round(f-e);
    const dp=isDay?Math.round(el2*100):Math.round(day/DM*100);
    return '<div class="oc '+cl+'"><div class="on2">'+s.n+'</div>'+
      '<div class="r3">'+
      '<div class="blk"><div class="bl">Факт</div><div class="fv">'+fm(f)+' ₽</div></div>'+
      '<div class="blk"><div class="bl">Ожидалось</div><div class="pv">'+fm(e)+' ₽</div></div>'+
      '<div class="blk"><div class="bl">'+(isDay?'В день':'Мес. план')+'</div><div class="dv">'+fm(isDay?Math.round(dv):pl)+' ₽</div></div></div>'+
      '<div class="pb2"><div class="p2r"><span class="p2 '+c2+'">'+pt+'%</span><span class="pbd">'+(isDay?ft(n)+' • '+dp+'% дня':day+' из '+DM+' дней')+'</span></div>'+
      '<div class="pbg"><div class="pbf '+c2+'" style="width:'+Math.min(pt,100)+'%"></div><div class="pbn" style="left:'+dp+'%"></div></div></div>'+
      '<div class="bdg '+c2+'">'+(df>=0?'▲':'▼')+' '+fm(Math.abs(df))+' ₽ '+(df>=0?'опережение':'отставание')+'</div></div>';
  }).join('');
}

function rT(n){
  const el2=(n.getHours()*60+n.getMinutes())/(24*60),dp=Math.round(el2*100);
  const y=n.getFullYear(),m=n.getMonth(),PL=gpl(y,m),DM=sdm(y,m);
  let tf=0,te=0,td=0;
  ST.forEach(s=>{tf+=TR[s.id]||0;td+=PL[s.id]/DM;te+=PL[s.id]/DM*el2;});
  const p=te>0?Math.round(tf/te*100):0,c=col(p);
  mkTop4('ct',[
    {c,ico:'📈',lbl:'Факт сегодня (все точки)',val:fm(tf)+' ₽',sub:'Ожидалось к '+ft(n)+': '+fm(Math.round(te))+' ₽',pct:p},
    {c,ico:'🎯',lbl:'Выполнение плана',val:p+'%',vc:c,sub:p>=100?'✓ Опережаем план':p>=80?'На верном пути':'Отстаём от плана'},
    {c:'n',ico:'📅',lbl:'Дневной план суммарно',val:fm(Math.round(td))+' ₽',sub:dp+'% дня прошло',pct:dp},
    {c:'n',ico:'⏱',lbl:'Сводка за сегодня',val:fm(tf)+' ₽',sub:'План: '+fm(Math.round(td))+'₽ / Ожид.: '+fm(Math.round(te))+' ₽'}
  ]);
  mkStrip('st2',tf,Math.round(td),Math.round(te),p,c,dp+'% дня','Дневной план');
  mkGrid('gt',TR,PL,DM,true,n);
}

function rM(n){
  const day=n.getDate(),y=n.getFullYear(),m=n.getMonth(),PL=gpl(y,m),DM=sdm(y,m),dp=Math.round(day/DM*100);
  let tf=0,tp=0,te=0;
  ST.forEach(s=>{tf+=MR[s.id]||0;tp+=PL[s.id]||0;te+=(PL[s.id]||0)/DM*day;});
  const p=te>0?Math.round(tf/te*100):0,c=col(p),rem=DM-day,nd=rem>0?Math.round((tp-tf)/rem):0;
  mkTop4('cm',[
    {c,ico:'📈',lbl:'Факт за '+day+' дней',val:fm(tf)+' ₽',sub:'Ожидалось: '+fm(Math.round(te))+' ₽',pct:p},
    {c,ico:'🎯',lbl:'Выполнение месяца',val:p+'%',vc:c,sub:p>=100?'✓ Опережаем':p>=80?'Близко к плану':'Отстаём'},
    {c:'n',ico:'📅',lbl:'Нужно в день (ост. '+rem+' дн.)',val:fm(nd)+' ₽',sub:'До конца: '+fm(Math.round(tp-tf))+' ₽'},
    {c:'n',ico:'📊',lbl:'Месячный план',val:fm(tp)+' ₽',sub:day+' из '+DM+' дней',pct:dp}
  ]);
  mkStrip('sm',tf,tp,Math.round(te),p,c,dp+'% месяца','Месячный план');
  mkGrid('gm',MR,PL,DM,false,n);
}

function rArch(){
  const n=new Date(),items=[];let y=2026,m=3;
  while(y<n.getFullYear()||(y===n.getFullYear()&&m<=n.getMonth())){
    const k='gca_'+y+'_'+m,s=localStorage.getItem(k);
    let tf=0,pct=0;if(s){try{const d=JSON.parse(s);tf=d.tf;pct=d.pct;}catch(e){}}
    const isCur=y===n.getFullYear()&&m===n.getMonth();
    items.unshift({y,m,name:MN[m]+' '+y,tf,pct,isCur,has:!!s});
    m++;if(m>11){m=0;y++;}
  }
  document.getElementById('ag').innerHTML=items.map(i=>
    '<div class="ac" data-y="'+i.y+'" data-m="'+i.m+'">'+
    '<div class="am">'+i.name+(i.isCur?' ●':'')+'</div>'+
    (i.tf?'<div class="at2">'+fm(i.tf)+' ₽</div><div class="ap '+col(i.pct)+'">'+i.pct+'% плана</div>':
    '<div style="font-size:11px;color:var(--dim)">'+(i.isCur?'Нажмите Обновить':'Нет данных')+'</div>')
    +'</div>').join('');
  document.querySelectorAll('.ac').forEach(c=>c.addEventListener('click',()=>openArch(+c.dataset.y,+c.dataset.m)));
}

async function openArch(y,m){
  document.getElementById('ag').style.display='none';
  document.getElementById('ad').style.display='block';
  document.getElementById('at3').textContent=MN[m]+' '+y;
  const n=new Date(),isCur=y===n.getFullYear()&&m===n.getMonth();
  const PL=gpl(y,m),DM=sdm(y,m),day=isCur?n.getDate():DM;
  let R={};
  if(isCur){R=MR;}
  else{
    const k='gca_'+y+'_'+m,s=localStorage.getItem(k);
    if(s){try{R=JSON.parse(s).R;}catch(e){}}
    else{
      ss('y','Загружаю архив '+MN[m]+'...');
      const df=y+'-'+String(m+1).padStart(2,'0')+'-01',dt=y+'-'+String(m+1).padStart(2,'0')+'-'+String(DM).padStart(2,'0');
      R=await fr(df,dt);
      let tf2=0,tp2=0;ST.forEach(s2=>{tf2+=R[s2.id]||0;tp2+=PL[s2.id]||0;});
      localStorage.setItem(k,JSON.stringify({R,tf:tf2,pct:tp2>0?Math.round(tf2/tp2*100):0}));
      ss('g','Данные актуальны');
    }
  }
  let tf=0,tp=0,te=0;ST.forEach(s=>{tf+=R[s.id]||0;tp+=PL[s.id]||0;te+=(PL[s.id]||0)/DM*day;});
  const p=te>0?Math.round(tf/te*100):0,c=col(p),dp=Math.round(day/DM*100);
  const fn={getDate:()=>day,getFullYear:()=>y,getMonth:()=>m,getHours:()=>23,getMinutes:()=>59};
  mkTop4('acd',[
    {c,ico:'📈',lbl:'Факт за '+day+' дней',val:fm(tf)+' ₽',sub:'Ожидалось: '+fm(Math.round(te))+' ₽',pct:p},
    {c,ico:'🎯',lbl:'Выполнение',val:p+'%',vc:c,sub:p>=100?'✓ Опережаем':p>=80?'Близко':'Отстаём'},
    {c:'n',ico:'📅',lbl:'Месячный план',val:fm(tp)+' ₽',sub:day+' из '+DM+' дней',pct:dp},
    {c:'n',ico:'📊',lbl:'Итог',val:fm(tf)+' ₽',sub:'Выполнение: '+p+'%'}
  ]);
  mkGrid('agd',R,PL,DM,false,fn);
}

function showTab(t){
  ['t','m','a'].forEach(x=>{
    document.getElementById('v'+x).style.display=x===t?'block':'none';
    document.getElementById('t'+x).classList.toggle('on',x===t);
  });
  if(t==='a')rArch();
}

function openPM(nm){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),PL=gpl(y,m),DM=sdm(y,m);
  document.getElementById('pmt').textContent=(nm?'Новый месяц! ':'')+'Планы на '+MN[m]+' '+y;
  document.getElementById('pms').textContent=nm?'Введите план для каждой точки:':'Редактировать планы:';
  document.getElementById('pil').innerHTML=ST.map(s=>
    '<div class="pr"><div class="pl">'+s.s+'</div>'+
    '<input type="number" class="pi" id="pi'+s.id+'" value="'+(PL[s.id]||'')+'" placeholder="0">'+
    '<div class="pd" id="pd'+s.id+'">'+((PL[s.id]||0)?fm(Math.round((PL[s.id]||0)/DM))+'/д':'')+'</div></div>'
  ).join('');
  ST.forEach(s=>{document.getElementById('pi'+s.id).addEventListener('input',()=>{
    const v=parseFloat(document.getElementById('pi'+s.id).value)||0;
    document.getElementById('pd'+s.id).textContent=v?fm(Math.round(v/DM))+'/д':'';
  });});
  document.getElementById('pm').classList.add('show');
}
function closePM(){document.getElementById('pm').classList.remove('show');}
function savePl(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth(),pl={};
  ST.forEach(s=>{pl[s.id]=parseFloat(document.getElementById('pi'+s.id).value)||0;});
  localStorage.setItem(gpk(y,m),JSON.stringify(pl));
  closePM();if(Object.keys(TR).length){rT(n);rM(n);}
}

document.getElementById('rb').addEventListener('click',load);
document.getElementById('pb').addEventListener('click',()=>openPM(false));
document.getElementById('psb').addEventListener('click',savePl);
document.getElementById('pcb').addEventListener('click',closePM);
document.getElementById('tt').addEventListener('click',()=>showTab('t'));
document.getElementById('tm').addEventListener('click',()=>showTab('m'));
document.getElementById('ta').addEventListener('click',()=>showTab('a'));
document.getElementById('abk').addEventListener('click',()=>{document.getElementById('ag').style.display='grid';document.getElementById('ad').style.display='none';});
initAuth();
</script>
