<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyros Club — План продаж</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#E8C97A;--bg:#0D0D0D;--bg2:#141414;--bg3:#1C1C1C;--border:rgba(201,168,76,.18);--text:#F0EAD6;--dim:#8a8070;--green:#4CAF7A;--red:#E05252;--yellow:#E0B952}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Jost,sans-serif;min-height:100vh}
#ls{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.lb2{background:var(--bg2);border:1px solid var(--border);padding:40px 32px;width:100%;max-width:360px;text-align:center}
.lsub{font-size:10px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:28px}
.lf{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-family:Jost,sans-serif;font-size:14px;outline:none;margin-bottom:10px;text-align:center}
.lf:focus{border-color:var(--gold)}
.lbtn{width:100%;background:var(--gold);color:#0D0D0D;border:none;padding:13px;font-family:Jost,sans-serif;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;margin-top:4px}
.lbtn:hover{background:var(--gold-l)}
.lerr{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
#ms{display:none}
.top{height:4px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 8px,transparent 8px,transparent 20px);opacity:.6}
header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.la{display:flex;align-items:center;gap:12px}
.lsvg{height:30px;width:auto;flex-shrink:0}
.ls2{font-size:9px;color:var(--dim);letter-spacing:.1em}
.lau{font-size:14px;color:rgba(201,168,76,.7);letter-spacing:.06em;margin-top:2px}
.hb{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn{border:none;cursor:pointer;font-family:Jost,sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;display:flex;align-items:center;gap:5px;transition:all .2s}
.bg{background:var(--gold);color:#0D0D0D}.bg:hover{background:var(--gold-l)}.bg:disabled{opacity:.5;cursor:wait}
.bo{background:transparent;color:var(--gold);border:1px solid var(--border)}.bo:hover{border-color:var(--gold)}
.sp{width:11px;height:11px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.sp.on{display:inline-block}
main{padding:14px 20px;max-width:1300px;margin:0 auto}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mb.show{display:flex}
.md{background:var(--bg2);border:1px solid var(--border);padding:26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mt{font-family:Cinzel,serif;font-size:14px;color:var(--gold);letter-spacing:.1em;margin-bottom:4px}
.ms{font-size:11px;color:var(--dim);margin-bottom:16px}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pl{font-size:11px;color:var(--text);flex:1}
.pi{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 9px;font-family:Jost,sans-serif;font-size:12px;outline:none;text-align:right;width:110px}
.pi:focus{border-color:var(--gold)}
.pd{font-size:9px;color:var(--dim);width:70px;text-align:right;flex-shrink:0}
.sb{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);font-size:11px;color:var(--dim)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.dot.live{background:var(--green);animation:pulse 2s infinite}.dot.e{background:var(--red)}.dot.ld{background:var(--yellow);animation:pulse .5s infinite}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:9px 16px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:Jost,sans-serif;white-space:nowrap;font-weight:600}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.card{background:var(--bg2);border:1px solid var(--border);padding:14px 16px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.5}
.card.g::before{background:var(--green)}.card.r::before{background:var(--red)}.card.y::before{background:var(--yellow)}.card.n::before{background:var(--gold);opacity:.3}
.cl{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.cv{font-size:22px;color:var(--text);font-weight:700}.cs{font-size:10px;color:var(--dim);margin-top:2px}
.strip{background:var(--bg2);border:1px solid var(--border);padding:12px 16px;margin-bottom:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:center}
.tl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.tv{font-size:17px;color:var(--gold);font-weight:700}.tv.s{font-size:13px;color:var(--dim);font-weight:400}
.pbw{display:flex;flex-direction:column;gap:3px}.pbr{display:flex;justify-content:space-between}
.pc{font-size:14px;font-weight:700}.pc.g{color:var(--green)}.pc.y{color:var(--yellow)}.pc.r{color:var(--red)}
.pbg{height:5px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.pbf{height:100%;transition:width 1s}
.pbf.g{background:linear-gradient(90deg,#2d7a52,var(--green))}.pbf.y{background:linear-gradient(90deg,#9a7a20,var(--yellow))}.pbf.r{background:linear-gradient(90deg,#8a2020,var(--red))}
.pbn{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.35)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.oc{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border);padding:13px;transition:border-color .2s,transform .15s}
.oc:hover{transform:translateY(-1px)}.oc.ov{border-left-color:var(--green)}.oc.tr{border-left-color:var(--yellow)}.oc.bh{border-left-color:var(--red)}
.on2{font-size:11px;color:var(--text);font-weight:600;margin-bottom:8px}
.r3{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
.blk{display:flex;flex-direction:column;gap:1px}
.bl{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.fv{font-size:15px;color:var(--text);font-weight:700}.pv{font-size:11px;color:var(--dim)}.dv{font-size:10px;color:var(--dim)}
.pb2{margin-bottom:7px}.p2r{display:flex;justify-content:space-between;margin-bottom:3px}
.p2{font-size:11px;font-weight:700}.p2.g{color:var(--green)}.p2.y{color:var(--yellow)}.p2.r{color:var(--red)}
.pbd{font-size:9px;color:var(--dim)}
.bdg{display:inline-flex;font-size:9px;padding:2px 5px}
.bdg.g{background:rgba(76,175,122,.12);color:var(--green)}.bdg.r{background:rgba(224,82,82,.12);color:var(--red)}.bdg.y{background:rgba(224,185,82,.12);color:var(--yellow)}
.sh{font-size:8px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.ac{background:var(--bg2);border:1px solid var(--border);padding:13px;cursor:pointer;transition:border-color .2s,transform .15s}
.ac:hover{border-color:var(--gold);transform:translateY(-1px)}
.am{font-family:Cinzel,serif;font-size:11px;color:var(--gold);margin-bottom:5px}
.at2{font-size:16px;color:var(--text);font-weight:700}
.ap{font-size:10px;margin-top:2px}.ap.g{color:var(--green)}.ap.y{color:var(--yellow)}.ap.r{color:var(--red)}
.wbtn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:Jost,sans-serif;font-size:9px;padding:5px 10px;cursor:pointer;letter-spacing:.08em;white-space:nowrap;transition:all .2s}
.wbtn.on{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08)}
.wtbl{width:100%;border-collapse:collapse;font-size:11px;min-width:480px}
.wtbl th{padding:6px 8px;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);text-align:right;font-weight:500}
.wtbl th:first-child{text-align:left}
.wtbl td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--dim);text-align:right}
.wtbl td:first-child{text-align:left;color:var(--text);font-weight:500;white-space:nowrap}
.wtbl tr.cur td{background:rgba(201,168,76,.05)}
.wtbl tr.cur td:first-child{color:var(--gold)}
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{padding:6px 8px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);text-align:right;font-weight:500}
.dtbl th:first-child{text-align:left}
.dtbl td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--dim);text-align:right}
.dtbl td:first-child{text-align:left;color:var(--text);font-weight:500}
.dtbl tr.best td{background:rgba(76,175,122,.07)!important}
.dtbl tr.best td:first-child{color:var(--green);font-weight:700}
.dtbl .g{color:var(--green)}.dtbl .y{color:var(--yellow)}.dtbl .r{color:var(--red)}
.dtbl .sr td{border-top:2px solid var(--border);background:var(--bg3)!important;font-weight:700;color:var(--text)}
.abtn{background:transparent;border:1px solid var(--border);color:var(--gold);font-family:Jost,sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;cursor:pointer;margin-top:14px;display:inline-block;margin-right:8px;transition:all .2s}
.abtn:hover,.abtn.on{border-color:var(--gold);background:rgba(201,168,76,.08)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}.strip{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.ag{grid-template-columns:1fr 1fr}header,main{padding:10px 12px}.cv{font-size:18px}.tv{font-size:14px}}
@media(max-width:480px){.cards{grid-template-columns:1fr}.strip{grid-template-columns:1fr}.ag{grid-template-columns:1fr 1fr}.cv{font-size:16px}.tv{font-size:13px}.tv.s{font-size:11px}.fv{font-size:13px}.lsvg{height:22px}}
</style>
</head>
<body>
<div id="ls">
  <div class="lb2">
    <svg style="height:32px;width:auto;margin-bottom:8px" viewBox="0 0 340 50" xmlns="http://www.w3.org/2000/svg"><text x="2" y="40" font-family="Georgia,serif" font-size="40" font-weight="900" fill="#E8241A" letter-spacing="3">GYROS CLUB</text></svg>
    <div class="lsub">план продаж</div>
    <input class="lf" id="li" type="text" placeholder="Логин" autocomplete="off" autocorrect="off" autocapitalize="off">
    <input class="lf" id="lp" type="password" placeholder="Пароль">
    <button class="lbtn" id="lbtn">Войти</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>
<div id="ms">
<div class="top"></div>
<div class="mb" id="pm">
  <div class="md">
    <div class="mt" id="pmt">Планы</div>
    <div class="ms" id="pms">Введите план (руб.)</div>
    <div id="pil"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn bg" id="psb" style="flex:1;justify-content:center">Сохранить</button>
      <button class="btn bo" id="pcb">Закрыть</button>
    </div>
  </div>
</div>
<header>
  <div class="la">
    <svg class="lsvg" viewBox="0 0 340 50" xmlns="http://www.w3.org/2000/svg"><text x="2" y="40" font-family="Georgia,serif" font-size="40" font-weight="900" fill="#E8241A" letter-spacing="3">GYROS CLUB</text></svg>
    <div><div class="ls2">Выполнение плана продаж</div><div class="lau">Created by Khadzhi S.S.</div></div>
  </div>
  <div class="hb">
    <span id="ut" style="font-size:10px;color:var(--dim)"></span>
    <button class="btn bo" id="pb" style="font-size:9px">&#9881; Планы</button>
    <button class="btn bg" id="rb"><div class="sp" id="sp"></div>&#8635; Обновить</button>
  </div>
</header>
<main>
  <div class="sb"><span class="dot" id="sd"></span><span id="st">Загрузка...</span></div>
  <div class="tabs">
    <button class="tab on" id="tt">Сегодня</button>
    <button class="tab" id="tm">Месяц</button>
    <button class="tab" id="tw">WoW</button>
    <button class="tab" id="ta">Архив</button>
  </div>
  <div id="vt"><div class="cards" id="ct"></div><div class="strip" id="st2"></div><div class="sh">По точкам — сегодня</div><div class="grid" id="gt"></div></div>
  <div id="vm" style="display:none"><div class="cards" id="cm"></div><div class="strip" id="sm"></div><div class="sh">По точкам — за месяц</div><div class="grid" id="gm"></div></div>
  <div id="vw" style="display:none">
    <div class="sh">Week over Week</div>
    <div id="wsel" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div id="wdates" style="font-size:10px;color:var(--dim);margin-bottom:12px"></div>
    <div class="cards" id="wc"></div>
    <div style="background:var(--bg2);border:1px solid var(--border);padding:12px 16px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="wtbl" id="wtbl"></table></div>
    <div class="sh">По точкам</div>
    <div class="grid" id="wg"></div>
  </div>
  <div id="va" style="display:none">
    <div class="sh">Архив (с апреля 2026)</div>
    <div class="ag" id="ag"></div>
    <div id="ad" style="display:none;margin-top:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <button class="btn bo" id="ab" style="font-size:9px">&#8592; Назад</button>
        <span id="adt" style="font-family:Cinzel,serif;font-size:13px;color:var(--gold)"></span>
      </div>
      <div class="cards" id="acd"></div>
      <div class="sh" style="margin-top:12px">По точкам</div>
      <div class="grid" id="agd"></div>
      <div style="margin-top:14px">
        <button class="abtn" id="dbtn">&#128197; По дням</button>
        <button class="abtn" id="wbtn2">&#128200; WoW недели</button>
      </div>
      <div id="dwrap" style="display:none;margin-top:12px">
        <div class="sh">Итого по дням месяца</div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="dtbl" id="dtbl"></table></div>
      </div>
      <div id="wwrap" style="display:none;margin-top:12px">
        <div class="sh">WoW — недели месяца</div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="wtbl" id="wwtbl"></table></div>
      </div>
    </div>
  </div>
</main>
</div>
<script>
var PX='https://gyros-proxy.gyrosclub161.workers.dev';
var LG='GC26',PW='gc2026/4';
var ST=[
  {id:43606,n:'01. Gyros Club Ворошиловский 55',s:'Ворошиловский 55',open:9,close:22},
  {id:48767,n:'02. Gyros Club Ленина 81/8',s:'Ленина 81/8',open:10,close:23},
  {id:55956,n:'03. Gyros Club Стачки 207',s:'Стачки 207',open:11,close:24},
  {id:57060,n:'04. Gyros Club Стачки 220',s:'Стачки 220',open:10,close:23},
  {id:78987,n:'06. Gyros Club Аксай',s:'Аксай',open:9,close:22},
  {id:95683,n:'07. Gyros Club Мануфактура',s:'Мануфактура',open:10,close:23},
  {id:101199,n:'08. Gyros Club Зорге 19/162',s:'Зорге 19/162',open:10,close:23}
];
var MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var DP={43606:1020000,48767:1560000,55956:1020000,57060:1320000,78987:1100000,95683:1800000,101199:1440000};
var TR={},MR={},wData=[],wIdx=-1,wLoaded=false,_aY=2026,_aM=3;

// AUTH
function chk(){return sessionStorage.getItem('gc_a')==='1';}
function doLogin(){
  var l=document.getElementById('li').value.trim(),p=document.getElementById('lp').value;
  if(l===LG&&p===PW){
    sessionStorage.setItem('gc_a','1');
    document.getElementById('ls').style.display='none';
    document.getElementById('ms').style.display='block';
    load();
  } else {
    document.getElementById('lerr').textContent='Неверный логин или пароль';
    document.getElementById('lp').value='';
  }
}
document.getElementById('lbtn').addEventListener('click',doLogin);
document.getElementById('lp').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('li').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('lp').focus();});
if(chk()){document.getElementById('ls').style.display='none';document.getElementById('ms').style.display='block';}

// UTILS
function gpk(y,m){return 'gcp_'+y+'_'+m;}
function gpl(y,m){try{var s=JSON.parse(localStorage.getItem(gpk(y,m))||'{}');if(Object.keys(s).length)return s;}catch(e){}return Object.assign({},DP);}
function sdm(y,m){return new Date(y,m+1,0).getDate();}
function fm(n){return Math.round(n).toLocaleString('ru-RU');}
function ft(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fdate(d){return d.getDate()+'.'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);}
function daysB(s,e){return Math.round((e-s)/864e5)+1;}
function col(p){return p>=100?'g':p>=80?'y':'r';}
function ss(c,x){document.getElementById('sd').className='dot '+(c==='g'?'live':c==='r'?'e':'ld');document.getElementById('st').textContent=x;}

// FETCH with retry
async function fbulk(df,dt,attempt){
  attempt=attempt||1;
  try{
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},12000);
    var rsp=await fetch(PX+'/bulk',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({dateFrom:df,dateTo:dt}),
      signal:ctrl.signal
    });
    clearTimeout(tid);
    var d=await rsp.json();
    if(!d.ok)throw new Error('server error');
    return d.data;
  }catch(e){
    if(attempt<5){
      await new Promise(function(res){setTimeout(res,attempt*1000);});
      return fbulk(df,dt,attempt+1);
    }
    throw new Error('Нет ответа от сервера. Нажмите Обновить.');
  }
}

// MAIN LOAD
async function load(){
  if(!chk())return;
  var b=document.getElementById('rb'),sp=document.getElementById('sp');
  b.disabled=true;sp.classList.add('on');
  ss('y','Загружаю данные из iiko...');
  try{
    var n=new Date(),td=fd(n),ms=fd(new Date(n.getFullYear(),n.getMonth(),1));
    var res=await Promise.all([fbulk(td,td),fbulk(ms,td)]);
    TR=res[0];MR=res[1];
    rT(n);rM(n);
    ss('g','Данные актуальны — '+n.toLocaleDateString('ru-RU')+' '+ft(n));
    document.getElementById('ut').textContent=n.toLocaleDateString('ru-RU')+' '+ft(n);
    chkPlan(n);
    wLoaded=false;wData=[];wIdx=-1;
  }catch(e){ss('r',''+e.message);}
  b.disabled=false;sp.classList.remove('on');
}

function chkPlan(n){
  var y=n.getFullYear(),m=n.getMonth(),d=n.getDate();
  if(d>=1&&d<=10&&!localStorage.getItem(gpk(y,m)))setTimeout(function(){openPM(true);},800);
}

// RENDER HELPERS
function mkCards(el,items){
  document.getElementById(el).innerHTML=items.map(function(x){
    return '<div class="card '+x.c+'"><div class="cl">'+x.l+'</div><div class="cv">'+x.v+'</div><div class="cs">'+x.s+'</div></div>';
  }).join('');
}
function mkStrip(el,tf,plan,te,pct,c,dpct,plabel){
  var dp2=String(dpct).match(/d+/);dp2=dp2?dp2[0]:'0';
  document.getElementById(el).innerHTML=
    '<div><div class="tl">Факт</div><div class="tv">'+fm(tf)+' ₽</div></div>'+
    '<div><div class="tl">'+plabel+'</div><div class="tv s">'+fm(plan)+' ₽</div></div>'+

function mkGrid(el,data,PL,DM,isDay,n){
  var nowMin2=isDay?n.getHours()*60+n.getMinutes():0;
  var day=isDay?0:n.getDate();
  var dp=isDay?0:Math.round(day/DM*100);
  var sorted=[].concat(ST).sort(function(a,b){
    var fa=data[a.id]||0,fb=data[b.id]||0;
    var sOpenA=(a.open||9)*60,sWdayA=((a.close||24)-(a.open||9))*60;
    var sOpenB=(b.open||9)*60,sWdayB=((b.close||24)-(b.open||9))*60;
    var elA=isDay?(nowMin2<sOpenA?0:Math.min((nowMin2-sOpenA)/sWdayA,1)):1;
    var elB=isDay?(nowMin2<sOpenB?0:Math.min((nowMin2-sOpenB)/sWdayB,1)):1;
    var ea=(PL[a.id]||0)/DM*(isDay?elA:day),eb=(PL[b.id]||0)/DM*(isDay?elB:day);
    return(eb>0?fb/eb:0)-(ea>0?fa/ea:0);
  });
  document.getElementById(el).innerHTML=sorted.map(function(s){
    var f=data[s.id]||0,pl=PL[s.id]||0,dv=pl/DM;
    var sOpen=(s.open||9)*60,sWday=((s.close||24)-(s.open||9))*60;
    var sEl=isDay?(nowMin2<sOpen?0:Math.min((nowMin2-sOpen)/sWday,1)):1;
    var sDp=isDay?Math.round(sEl*100):dp;
    var e=Math.round(dv*(isDay?sEl:day));
    var pt=e>0?Math.round(f/e*100):0,c2=col(pt),cl=pt>=100?'ov':pt>=80?'tr':'bh',df=Math.round(f-e);
    return '<div class="oc '+cl+'"><div class="on2">'+s.n+'</div>'+
      '<div class="r3">'+
        '<div class="blk"><div class="bl">Факт</div><div class="fv">'+fm(f)+' ₽</div></div>'+
        '<div class="blk"><div class="bl">Ожидалось</div><div class="pv">'+fm(e)+' ₽</div></div>'+
        '<div class="blk"><div class="bl">'+(isDay?'В день':'Мес. план')+'</div><div class="dv">'+fm(isDay?Math.round(dv):pl)+' ₽</div></div>'+
      '</div>'+
      '<div class="pb2"><div class="p2r"><span class="p2 '+c2+'">'+pt+'%</span>'+
        '<span class="pbd">'+(isDay?ft(n)+' • '+sDp+'% дня':day+' из '+DM+' дн.')+'</span></div>'+
        '<div class="pbg"><div class="pbf '+c2+'" style="width:'+Math.min(pt,100)+'%"></div>'+
        '<div class="pbn" style="left:'+sDp+'%"></div></div></div>'+
      '<div class="bdg '+c2+'">'+(df>=0?'▲':'▼')+' '+fm(Math.abs(df))+' ₽ '+(df>=0?'опережение':'отставание')+'</div>'+
    '</div>';
  }).join('');
}

function rT(n){
  var nowMin=n.getHours()*60+n.getMinutes();
  var y=n.getFullYear(),m=n.getMonth(),PL=gpl(y,m),DM=sdm(y,m),tf=0,te=0,td=0;
  ST.forEach(function(s){
    tf+=TR[s.id]||0;

    var sOpen=s.open*60,sWday=(s.close-s.open)*60;
    var sEl=nowMin<sOpen?0:Math.min((nowMin-sOpen)/sWday,1);
    te+=dv*sEl;td+=dv;
  });
  var p=te>0?Math.round(tf/te*100):0,c=col(p);
  var avgOpen=Math.round(ST.reduce(function(a,s){return a+s.open;},0)/ST.length);

  var avgEl=nowMin<avgOpen*60?0:Math.min((nowMin-avgOpen*60)/((avgClose-avgOpen)*60),1);
  var dp=Math.round(avgEl*100);

    {l:'Факт сегодня (все точки)',v:fm(tf)+' ₽',s:'Ожидалось к '+ft(n)+': '+fm(Math.round(te))+' ₽',c:c},

  ]);

function rM(n){

// WoW
function getWeeks(y,m){
  var weeks=[],today=new Date();
  var first=new Date(y,m,1),last=new Date(y,m+1,0);
  if(last>today)last=new Date(today);
  var wStart=new Date(first);
  while(wStart<=last){
    var wEnd=new Date(wStart);
    var dow=wStart.getDay(),daysToSun=dow===0?6:7-dow;
    wEnd.setDate(wStart.getDate()+daysToSun);
    if(wEnd>last)wEnd=new Date(last);
    weeks.push({s:new Date(wStart),e:new Date(wEnd)});
    var next=new Date(wEnd);next.setDate(next.getDate()+1);
    wStart=next;
  }
  return weeks;
}

      var pAvg=prev?Math.round(Object.values(prev.data).reduce(function(a,b){return a+b;},0)/daysB(prev.w.s,prev.w.e)):null;
      var pct=pAvg>0?Math.round((avg-pAvg)/pAvg*100):null;
      var tc=pct===null?'var(--dim)':pct>=0?'var(--green)':'var(--red)';
      h+='<tr>'+
        '<td style="padding:6px 8px;color:var(--text);white-space:nowrap">Н'+(i+1)+': '+fdate(res.w.s)+'-'+fdate(res.w.e)+' ('+days+'д.)</td>'+
        '<td style="text-align:right;padding:6px 8px;color:var(--text);font-weight:600">'+fm(tot)+' ₽</td>'+
        '<td style="text-align:right;padding:6px 8px;color:var(--dim)">'+fm(avg)+' ₽</td>'+
        '<td style="text-align:right;padding:6px 8px;color:'+tc+'">'+(pct!==null?(pct>=0?'+':'')+pct+'%':'—')+'</td>'+
      '</tr>';
    });
    h+='</tbody>';
    tbl.innerHTML=h;
  }catch(e){tbl.innerHTML='<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--red)">Ошибка: '+e.message+'</td></tr>';}
}

// TABS
function showTab(t){
  ['t','m','w','a'].forEach(function(x){
    document.getElementById('v'+x).style.display=x===t?'block':'none';
    document.getElementById('t'+x).classList.toggle('on',x===t);
  });
  if(t==='a')rArch();
  if(t==='w')loadWow();
}

// PLANS
function openPM(nm){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth(),PL=gpl(y,m),DM=sdm(y,m);
  document.getElementById('pmt').textContent=(nm?'Новый месяц! ':'')+'Планы на '+MN[m]+' '+y;
  document.getElementById('pms').textContent=nm?'Введите план на '+MN[m]+':':'Редактировать планы:';
  document.getElementById('pil').innerHTML=ST.map(function(s){
    return '<div class="pr"><div class="pl">'+s.s+'</div>'+
      '<input type="number" class="pi" id="pi'+s.id+'" value="'+(PL[s.id]||'')+'" placeholder="0">'+
      '<div class="pd" id="pd'+s.id+'">'+((PL[s.id]||0)?fm(Math.round((PL[s.id]||0)/DM))+'/д':'')+'</div></div>';
  }).join('');
  ST.forEach(function(s){
    document.getElementById('pi'+s.id).addEventListener('input',function(){
      var v=parseFloat(document.getElementById('pi'+s.id).value)||0;
      document.getElementById('pd'+s.id).textContent=v?fm(Math.round(v/DM))+'/д':'';
    });
  });
  document.getElementById('pm').classList.add('show');
}
function savePl(){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth(),pl={};
  ST.forEach(function(s){pl[s.id]=parseFloat(document.getElementById('pi'+s.id).value)||0;});
  localStorage.setItem(gpk(y,m),JSON.stringify(pl));
  document.getElementById('pm').classList.remove('show');
  if(Object.keys(TR).length){rT(n);rM(n);}
}

// EVENTS
document.getElementById('rb').addEventListener('click',load);
document.getElementById('pb').addEventListener('click',function(){openPM(false);});
document.getElementById('psb').addEventListener('click',savePl);
document.getElementById('pcb').addEventListener('click',function(){document.getElementById('pm').classList.remove('show');});
document.getElementById('tt').addEventListener('click',function(){showTab('t');});
document.getElementById('tm').addEventListener('click',function(){showTab('m');});
document.getElementById('tw').addEventListener('click',function(){showTab('w');});
document.getElementById('ta').addEventListener('click',function(){showTab('a');});
document.getElementById('ab').addEventListener('click',function(){
  document.getElementById('ag').style.display='grid';
  document.getElementById('ad').style.display='none';
});
document.getElementById('dbtn').addEventListener('click',function(){
  var w=document.getElementById('dwrap'),open=w.style.display==='block';
  if(open){w.style.display='none';this.textContent='📅 По дням';this.classList.remove('on');}
  else{w.style.display='block';this.textContent='📅 Скрыть';this.classList.add('on');loadDays(_aY,_aM);}
});
document.getElementById('wbtn2').addEventListener('click',function(){
  var w=document.getElementById('wwrap'),open=w.style.display==='block';
  if(open){w.style.display='none';this.textContent='📂 WoW недели';this.classList.remove('on');}
  else{w.style.display='block';this.textContent='📂 Скрыть';this.classList.add('on');loadArchWow(_aY,_aM);}
});

if(chk())load();
</script>
